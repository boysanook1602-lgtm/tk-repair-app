<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&K Professional Service Hub</title>
    
    <!-- ใช้ html2canvas สำหรับถ่ายรูปภาพบิล -->
    <script src="https://cloudflare.com"></script>

    <style>
        @import url('https://googleapis.com');
        
        /* ตกแต่งพื้นหลังแอปให้อ่านง่าย สบายตา ไม่มืดจม */
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f1f5f9; 
            color: #0f172a; 
            padding: 10px;
            margin: 0;
        }
        
        .container {
            max-width: 500px;
            margin: auto;
        }

        /* กล่องเมนูสลับหน้าบิล */
        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #cbd5e1;
            color: #334155;
            transition: 0.2s;
        }
        .tab-btn.active {
            background-color: #0284c7;
            color: white;
            box-shadow: 0 4px 6px rgba(2, 132, 199, 0.2);
        }

        /* กล่องฟอร์มกรอกข้อมูลการซ่อม */
        .form-zone {
            background-color: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        .form-title {
            font-size: 15px;
            font-weight: bold;
            color: #0369a1;
            margin-top: 0;
            margin-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 6px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .form-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .form-row > div {
            flex: 1;
        }
        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 4px;
        }
        
        /* ช่องกรอกข้อมูลสีขาวเด่นชัด */
        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 8px 10px;
            font-size: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #ffffff;
            color: #0f172a;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #0284c7;
        }

        .btn-add {
            width: 100%;
            background-color: #f8fafc;
            color: #475569;
            border: 1px dashed #cbd5e1;
            padding: 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 5px;
        }

        /* 📄 ดีไซน์กระดาษใบเสร็จที่พร้อมถ่ายรูปส่งให้ลูกค้า */
        .invoice-paper { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }
        .bill-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-b: 2px solid #cbd5e1;
            padding-bottom: 10px;
            margin-bottom: 12px;
        }
        .bill-title {
            font-size: 16px;
            font-weight: 800;
            color: #1e3a8a;
            margin: 0;
        }
        .info-grid {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .info-card {
            flex: 1;
            border: 1px solid #e2e8f0;
            padding: 8px;
            border-radius: 8px;
            font-size: 10px;
            background-color: #f8fafc;
        }
        .card-title {
            font-weight: bold;
            color: #1e3a8a;
            margin: 0 0 4px 0;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 2px;
        }
        
        /* ตารางสรุปราคาบิล */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-top: 5px;
        }
        th {
            background-color: #1e3a8a;
            color: white;
            padding: 6px;
            font-size: 10px;
            text-align: left;
        }
        td {
            padding: 6px;
            border-bottom: 1px solid #f1f5f9;
        }
        .text-right { text-align: right; }
        .text-center { text-align: center; }

        .note-box {
            margin-top: 10px;
            background-color: #f8fafc;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            font-size: 9px;
        }

        .bill-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #e2e8f0;
        }
        .bank-box {
            border: 1px solid #bfdbfe;
            padding: 8px;
            border-radius: 8px;
            background-color: #eff6ff;
            font-size: 9px;
            width: 60%;
        }
        .total-box {
            text-align: right;
            width: 35%;
        }
        .total-price {
            font-size: 18px;
            font-weight: 900;
            color: #d97706;
        }

        /* 🟢 ปุ่มสีเขียวสำหรับกดเซฟรูปภาพลงมือถือ */
        .btn-capture {
            width: 100%;
            background: linear-gradient(to right, #059669, #0d9488);
            color: white;
            font-weight: bold;
            padding: 14px;
            font-size: 13px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 15px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 🧭 สลับหน้าจอทำบิลระหว่างลูกค้า กับ สั่งอะไหล่ -->
        <div class="tab-menu">
            <button id="tab-repair" onclick="switchMode('repair')" class="tab-btn active">🔧 บิลซ่อมเครื่องใช้ไฟฟ้า</button>
            <button id="tab-parts" onclick="switchMode('parts')" class="tab-btn">📦 บิลสั่งซื้ออะไหล่ร้าน</button>
        </div>

        <!-- ========================================================================= -->
        <!-- 1. [ฟอร์มกรอก] - ระบบบิลซ่อมเครื่องใช้ไฟฟ้า -->
        <!-- ========================================================================= -->
        <div id="form-repair-zone" class="form-zone">
            <div class="form-title">📝 ข้อมูลสำหรับออกบิลซ่อมลูกค้า</div>
            
            <div class="form-group">
                <label>ชื่อผู้รับบริการ / ลูกค้า:</label>
                <input type="text" id="rep-customer" oninput="updateInvoiceDisplay()" placeholder="เช่น พี่ต้อย">
            </div>
            <div class="form-row">
                <div>
                    <label>เบอร์โทรศัพท์:</label>
                    <input type="text" id="rep-phone" oninput="updateInvoiceDisplay()" placeholder="เช่น 0969525716">
                </div>
                <div>
                    <label>พื้นที่ / อำเภอ จังหวัด:</label>
                    <input type="text" id="rep-address" oninput="updateInvoiceDisplay()" placeholder="เช่น อ.สำโรงทาบ จ.สุรินทร์">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>ผู้จ่ายงาน / เจ้าหน้าที่:</label>
                    <input type="text" id="rep-staff" oninput="updateInvoiceDisplay()" placeholder="เช่น น้ำติ๊ก">
                </div>
                <div>
                    <label>ช่างผู้รับผิดชอบ:</label>
                    <input type="text" id="rep-mechanic" oninput="updateInvoiceDisplay()" placeholder="เช่น ช่างเต่า">
                </div>
            </div>
            
            <div style="margin-top: 10px;">
                <label>รายการบริการ / รายละเอียดอะไหล่ชิ้นส่วน:</label>
                <div id="rep-items-list">
                    <div class="form-row" style="margin-bottom: 5px;">
                        <input type="text" placeholder="ระบุรายการบริการซ่อม/อะไหล่" style="flex: 6;" class="rep-item-desc" oninput="updateInvoiceDisplay()">
                        <input type="number" placeholder="ราคา" style="flex: 3; text-align: right;" class="rep-item-price" oninput="updateInvoiceDisplay()">
                        <input type="number" placeholder="ตัว" value="1" style="flex: 2; text-align: center;" class="rep-item-qty" oninput="updateInvoiceDisplay()">
                    </div>
                </div>
                <button onclick="addRepairItemRow()" class="btn-add">+ เพิ่มแถวรายการซ่อมเพิ่ม</button>
            </div>

            <div class="form-group" style="margin-top: 10px;">
                <label>บันทึกรายงานเพิ่มเติมจากช่าง / เงื่อนไขประกัน:</label>
                <textarea id="rep-note" rows="2" oninput="updateInvoiceDisplay()" placeholder="เช่น ซ่อมระบบไฟเสร็จเรียบร้อย ตรวจเช็คการทำงานปกติ..."></textarea>
            </div>
        </div>

        <!-- ========================================================================= -->
        <!-- 2. [ฟอร์มกรอก] - ระบบบิลสั่งซื้ออะไหล่ร้าน (ซ่อนไว้เริ่มต้น) -->
        <!-- ========================================================================= -->
