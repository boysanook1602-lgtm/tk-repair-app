<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&K Invoice Hub</title>
    <style>
        @import url('https://googleapis.com');
        
        /* ปรับหน้าแอปให้สว่างสะอาดตา มองเห็นชัดเจน 100% */
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f1f5f9; 
            color: #0f172a; 
            padding: 12px;
            margin: 0;
        }
        .container { max-width: 500px; margin: auto; }
        
        /* ปุ่มสลับหน้าบิลซ่อม และ บิลสั่งอะไหล่ */
        .tab-menu { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 12px; font-size: 13px; font-weight: bold;
            border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer;
            background-color: #e2e8f0; color: #334155;
        }
        .tab-btn.active { background-color: #0284c7; color: white; border-color: #0284c7; }

        /* กล่องสีขาวสำหรับกรอกข้อมูล */
        .form-zone {
            background-color: white; padding: 16px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #cbd5e1;
        }
        .form-title {
            font-size: 14px; font-weight: bold; color: #0369a1;
            margin-top: 0; margin-bottom: 12px; border-bottom: 2px solid #0284c7; padding-bottom: 6px;
        }
        .form-group { margin-bottom: 10px; }
        .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .form-row > div { flex: 1; }
        label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 4px; }
        
        /* ช่องกรอกข้อมูลสีขาว ชัดเจน พิมพ์ง่าย */
        input[type="text"], input[type="number"], textarea {
            width: 100%; padding: 10px; font-size: 13px;
            border: 1px solid #94a3b8; border-radius: 6px; box-sizing: border-box;
            background-color: #ffffff; color: #0f172a;
        }

        /* 📄 แผ่นกระดาษใบเสร็จ T&K สำหรับใช้แคปหน้าจอ */
        .invoice-paper { 
            background: white; padding: 20px; border-radius: 12px;
            color: #1e293b; border: 2px solid #1e3a8a; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-top: 10px; margin-bottom: 20px;
        }
        .bill-title { font-size: 18px; font-weight: 800; color: #1e3a8a; margin: 0; }
        .info-grid { display: flex; gap: 8px; margin-top: 10px; margin-bottom: 10px; }
        .info-card {
            flex: 1; border: 1px solid #cbd5e1; padding: 8px;
            border-radius: 8px; font-size: 11px; background-color: #f8fafc; color: #1e293b;
        }
        .card-title { font-weight: bold; color: #1e3a8a; margin: 0 0 4px 0; border-bottom: 1px solid #cbd5e1; padding-bottom: 2px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { background-color: #1e3a8a; color: white; padding: 8px; font-size: 11px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #e2e8f0; color: #1e293b; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        
        .bank-box {
            border: 1px solid #bfdbfe; padding: 10px; border-radius: 8px;
            background-color: #eff6ff; font-size: 10px; width: 60%; float: left; color: #1e293b;
        }
        .total-box { text-align: right; width: 35%; float: right; padding-top: 8px; }
        .total-price { font-size: 20px; font-weight: 900; color: #d97706; }
        .note-box {
            margin-top: 10px; background-color: #f8fafc; padding: 8px;
            border-radius: 6px; border: 1px solid #cbd5e1; font-size: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- เมนูหลักสลับหน้าจอบิลซ่อม และ ใบสั่งซื้ออะไหล่ -->
        <div class="tab-menu">
            <button id="tab-repair" onclick="switchMode('repair')" class="tab-btn active">🔧 บิลซ่อมลูกค้า</button>
            <button id="tab-parts" onclick="switchMode('parts')" class="tab-btn">📦 บิลสั่งซื้ออะไหล่</button>
        </div>

        <!-- [หน้าฟอร์ม] 1. ข้อมูลบิลซ่อมลูกค้า -->
        <div id="form-repair-zone" class="form-zone">
            <div class="form-title">🔧 กรอกข้อมูลบิลซ่อมเครื่องใช้ไฟฟ้า</div>
            <div class="form-group">
                <label>ชื่อลูกค้า:</label>
                <input type="text" id="rep-customer" oninput="updateInvoiceDisplay()" placeholder="เช่น พี่ต้อย">
            </div>
            <div class="form-row">
                <div>
                    <label>เบอร์โทรศัพท์:</label>
                    <input type="text" id="rep-phone" oninput="updateInvoiceDisplay()" placeholder="เช่น 0969525716">
                </div>
                <div>
                    <label>พื้นที่ / อำเภอ จังหวัด:</label>
                    <input type="text" id="rep-address" oninput="updateInvoiceDisplay()" placeholder="เช่น อ.สำโรงทาบ จ.สุรินทร์">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>ผู้จ่ายงาน:</label>
                    <input type="text" id="rep-staff" oninput="updateInvoiceDisplay()" placeholder="เช่น น้ำติ๊ก">
                </div>
                <div>
                    <label>ช่างผู้ซ่อม:</label>
                    <input type="text" id="rep-mechanic" oninput="updateInvoiceDisplay()" placeholder="เช่น ช่างเต่า">
                </div>
            </div>
            <div class="form-row">
                <div style="flex: 7;"><label>รายละเอียดงานซ่อม / อะไหล่:</label><input type="text" id="rep-desc-1" oninput="updateInvoiceDisplay()" placeholder="เช่น งานซ่อมตู้เย็น"></div>
                <div style="flex: 3;"><label>ราคา (บาท):</label><input type="number" id="rep-price-1" oninput="updateInvoiceDisplay()" placeholder="เช่น 600"></div>
            </div>
            <div class="form-group">
                <label>บันทึกรายงานเพิ่มเติม / เงื่อนไขประกัน:</label>
                <textarea id="rep-note" rows="2" oninput="updateInvoiceDisplay()" placeholder="เช่น รับประกันอะไหล่ระบบไฟ 3 เดือน..."></textarea>
            </div>
        </div>

        <!-- [หน้าฟอร์ม] 2. ข้อมูลบิลสั่งอะไหล่ร้าน -->
        <div id="form-parts-zone" class="form-zone" style="display: none;">
            <div class="form-title" style="color: #b45309;">📦 กรอกข้อมูลสั่งซื้ออะไหล่ร้านภายใน</div>
            <div class="form-row">
                <div>
                    <label>สั่งซื้อจากร้าน:</label>
                    <input type="text" id="part-supplier" oninput="updateInvoiceDisplay()" placeholder="เช่น ร้านอะไหล่กรุงเทพ">
                </div>
                <div>
                    <label>ผู้จัดซื้อ / ช่าง:</label>
                    <input type="text" id="part-buyer" oninput="updateInvoiceDisplay()" placeholder="เช่น ช่างประสงค์">
                </div>
            </div>
            <div class="form-group">
                <label>สั่งเพื่อเคสงานซ่อมของลูกค้าคนไหน:</label>
                <input type="text" id="part-purpose" oninput="updateInvoiceDisplay()" placeholder="เช่น อะไหล่ตู้เย็นคุณพี่ต้อย">
            </div>
            <div class="form-row">
                <div style="flex: 7;"><label>ชื่อชิ้นส่วนอะไหล่ที่สั่งซื้อ:</label><input type="text" id="part-desc-1" oninput="updateInvoiceDisplay()" placeholder="เช่น คอมเพรสเซอร์ตู้เย็น"></div>
                <div style="flex: 3;"><label>ราคา (บาท):</label><input type="number" id="part-price-1" oninput="updateInvoiceDisplay()" placeholder="เช่น 1200"></div>
            </div>
            <div class="form-group">
                <label>หมายเหตุ / ความเร่งด่วน:</label>
                <input type="text" id="part-note" oninput="updateInvoiceDisplay()" placeholder="เช่น ด่วนมาก ลูกค้ารอใช้งาน">
            </div>
        </div>

        <!-- 📄 ตัวใบเสร็จที่แสดงผลตามการพิมพ์จริงแบบทันที (Real-Time) -->
        <div class="invoice-paper">
            <div style="display: flex; justify-content: space-between; border-bottom: 2px solid #cbd5e1; padding-bottom: 8px; margin-bottom: 10px;">
                <div style="width: 65%;">
                    <h1 id="bill-header-title" class="bill-title">ELECTRICAL SERVICE</h1>
                    <p style="font-size: 9px; color: #64748b; margin: 2px 0 0 0; font-weight: 500;">ศูนย์บริการซ่อมเครื่องใช้ไฟฟ้าทุกชนิด ทั่วจังหวัดสุรินทร์</p>
                    <p style="font-size: 9px; color: #1e3a8a; margin: 4px 0 0 0; font-weight: bold;">📞 โทร / Line: 063-671-8151</p>
                </div>
                <div style="width: 35%; text-align: right; font-size: 9px; color: #475569; line-height: 1.4;">
                    <p><strong>วันที่ออกบิล:</strong> <span id="lbl-date">-</span></p>
                    <p style="margin-top: 3px;"><strong>เลขที่บิล:</strong> <span id="lbl-inv-no" style="font-weight: bold; color: #1e3a8a; background-color: #f1f5f9; padding: 2px 4px; border-radius: 4px; font-family: monospace;">-</span></p>
                </div>
            </div>

            <div id="info-cards-container" class="info-grid">
                <!-- ข้อมูลลูกค้าแสดงตรงนี้ -->
            </div>

            <table>
                <thead>
                    <tr id="table-header-row" style="background-color: #1e3a8a; color: white;">
                        <th class="text-center" style="width: 12%; border-top-left-radius: 6px; border-bottom-left-radius: 6px;">ลำดับ</th>
                        <th style="width: 53%;">รายละเอียดรายการ</th>
                        <th class="text-right" style="width: 35%; border-top-right-radius: 6px; border-bottom-right-radius: 6px;">รวมเงิน (บาท)</th>
                    </tr>
                </thead>
                <tbody id="invoice-rows">
                    <!-- รายการบิล -->
                </tbody>
            </table>
