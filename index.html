<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&K ELECTRICAL - Smart Billing System 2026</title>
    <style>
        /* สไตล์หน้าจอป้อนข้อมูลสไตล์แอปยุค 2026 */
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
        body { background-color: #0f172a; color: #f8fafc; padding: 16px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .app-container { width: 100%; max-width: 650px; background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 24px; padding: 24px; border: 1px solid #334155; margin-bottom: 30px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { color: #38bdf8; font-size: 26px; font-weight: 800; letter-spacing: 0.5px; }
        .header p { color: #94a3b8; font-size: 13px; margin-top: 4px; }
        
        .form-group { margin-bottom: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
        label { display: block; font-size: 12px; color: #38bdf8; margin-bottom: 6px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { width: 100%; background-color: #1e293b; border: 1px solid #475569; border-radius: 12px; padding: 12px; color: white; font-size: 14px; outline: none; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #38bdf8; background-color: #0f172a; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }
        textarea { resize: none; height: 75px; }
        
        .grid-items { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; gap: 8px; }
        .btn-print-trigger { background: linear-gradient(135deg, #ea580c 0%, #ca8a04 100%); width: 100%; max-width: 650px; border: none; color: white; padding: 16px; font-size: 16px; font-weight: bold; border-radius: 14px; cursor: pointer; margin-bottom: 25px; text-align: center; box-shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.3); transition: transform 0.2s; }
        .btn-print-trigger:active { transform: scale(0.98); }

        /* ----------------------------------------------
           สไตล์แผ่นบิลใบเสร็จรับเงินขนาด A4 สากลและทันสมัย
        ---------------------------------------------- */
        #a4Invoice { display: block; background-color: white; color: #1e293b; width: 210mm; min-height: 297mm; padding: 20mm; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; border-radius: 4px; }
        .invoice-header { display: flex; justify-content: space-between; border-bottom: 3px solid #0284c7; padding-bottom: 20px; margin-bottom: 24px; }
        .shop-info h2 { color: #0284c7; font-size: 26px; font-weight: 800; }
        .shop-info p { font-size: 13px; color: #475569; margin-top: 3px; font-weight: 500; }
        .invoice-title { text-align: right; }
        .invoice-title h1 { font-size: 28px; color: #0f172a; font-weight: 800; letter-spacing: 1px; }
        .invoice-title p { font-size: 13px; margin-top: 4px; color: #64748b; font-weight: 600; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .client-info { background-color: #f8fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 12px; font-size: 13px; line-height: 1.7; color: #334155; }
        .client-info strong { color: #0f172a; font-size: 14px; }
        
        /* สไตล์ตารางรายงานบนบิล A4 */
        .invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 13px; }
        .invoice-table th { background-color: #f1f5f9; border: 1px solid #cbd5e1; padding: 12px 10px; text-align: left; font-weight: 700; color: #0f172a; }
        .invoice-table td { border: 1px solid #cbd5e1; padding: 12px 10px; vertical-align: top; color: #334155; }
        
        .total-section { display: flex; flex-direction: column; align-items: flex-end; margin-top: 15px; border-top: 2px solid #e2e8f0; padding-top: 12px; font-size: 14px; color: #475569; gap: 6px; }
        .total-row { display: flex; justify-content: space-between; width: 280px; }
        .total-row.grand { font-size: 18px; font-weight: 800; color: #0284c7; margin-top: 4px; border-top: 1px solid #cbd5e1; padding-top: 6px; }
        
        .invoice-warranty { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); border: 1px dashed #22c55e; padding: 14px; border-radius: 10px; margin-top: 20px; text-align: center; color: #15803d; font-weight: 700; font-size: 13px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .bank-info { background: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 100%); border: 1px solid #bae6fd; padding: 14px; border-radius: 10px; margin-top: 16px; font-size: 13px; color: #0369a1; line-height: 1.6; }
        
        /* พื้นที่เซ็นชื่อและประทับตรา */
        .invoice-footer { margin-top: 45px; display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 20px; text-align: center; font-size: 13px; }
        .signature-section { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .signature-box { border-top: 1px dashed #64748b; width: 100%; max-width: 180px; margin-top: 55px; padding-top: 6px; color: #334155; font-weight: 600; }
        .stamp-zone { font-size: 11px; color: #94a3b8; border: 2px dashed #cbd5e1; padding: 12px 5px; border-radius: 10px; width: 100%; max-width: 180px; margin-bottom: 12px; text-align: center; background-color: #fafafa; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

        @media print {
            body { background: white; padding: 0; }
            .app-container, .btn-print-trigger { display: none !important; }
            #a4Invoice { display: block !important; margin: 0; box-shadow: none; width: 100%; padding: 10mm; }
        }
    </style>
</head>
<body>

    <!-- แผงควบคุมดีไซน์ล้ำสมัย 2026 สำหรับกรอกข้อมูลบนโทรศัพท์มือถือ -->
    <div class="app-container">
        <div class="header">
            <h1>T&K ELECTRICAL</h1>
            <p>Smart Auto-Billing Cloud System (Real-Time 2026)</p>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>ชื่อเจ้าของบ้าน / ลูกค้า</label>
                <input type="text" id="custName" oninput="updateBillData()" placeholder="เช่น พี่ต้อย">
            </div>
            <div class="form-group">
                <label>เบอร์โทรศัพท์ติดต่อ</label>
                <input type="text" id="custPhone" oninput="updateBillData()" placeholder="เช่น 0969525716">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>อำเภอ (ในจังหวัดสุรินทร์)</label>
                <input type="text" id="custDist" oninput="updateBillData()" placeholder="เช่น สำโรงทาบ">
            </div>
            <div class="form-group">
                <label>ประเภทภาษี (Tax Option)</label>
                <select id="taxStatus" onchange="updateBillData()">
                    <option value="none">ไม่มีภาษี (Non-VAT)</option>
                    <option value="vat7">ภาษีมูลค่าเพิ่ม (VAT 7%)</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>ผู้ตรวจรับงาน / ผู้จ่ายเงินหน้างาน</label>
                <input type="text" id="payerName" oninput="updateBillData()" placeholder="เช่น น้ำติ๊ก">
            </div>
            <div class="form-group">
                <label>วิศวกรช่างซ่อมบำรุง (ผู้ทำงาน)</label>
                <input type="text" id="techName" oninput="updateBillData()" placeholder="เช่น เต่า">
            </div>
        </div>

        <div class="form-group">
            <label>สถานะข้อตกลงงานซ่อม</label>
            <select id="custStatus" onchange="updateBillData()">
                <option value="yes">✅ ลูกค้าตกลงอนุมัติซ่อมแซม (คิดค่าแรง+อะไหล่)</option>
                <option value="no">❌ ลูกค้าไม่ซ่อม/ไม่มีอะไหล่ (คิดเฉพาะค่าเดินทาง)</option>
            </select>
        </div>

        <hr style="border:0; border-top: 1px solid #334155; margin: 16px 0;">
        
        <div class="grid-items" style="margin-bottom: 4px;">
            <label>หมวดอุปกรณ์</label>
            <label>อะไหล่/ชิ้นส่วน</label>
            <label>ราคา/หน่วย</label>
            <label>จำนวน</label>
        </div>
        
        <div class="grid-items">
            <select id="itemType" onchange="updateBillData()">
                <option value="TV">ทีวี (TV Service)</option>
                <option value="WashingMachine">เครื่องซักผ้า</option>
                <option value="Refrigerator">ตู้เย็น</option>
                <option value="ACRepair">ซ่อมแอร์บ้าน</option>
                <option value="ACWash">ล้างแอร์บ้าน</option>
                <option value="Fan">พัดลม</option>
            </select>
            <input type="text" id="itemDetail" oninput="updateBillData()" placeholder="เช่น บอด">
            <input type="number" id="itemPrice" oninput="updateBillData()" placeholder="บาท" value="50">
            <input type="number" id="itemQty" oninput="updateBillData()" placeholder="ชิ้น" value="1">
        </div>

        <div class="form-group" style="margin-top: 14px;">
            <label>📝 รายงานเชิงเทคนิคและการประเมินอาการเสียเพิ่มเติม</label>
            <textarea id="jobDetail" oninput="updateBillData()" placeholder="ระบุแบรนด์ รุ่น ยี่ห้อ หรืออาการเสียของเครื่องใช้ไฟฟ้าอย่างละเอียด..."></textarea>
        </div>
    </div>

    <!-- ปุ่มสั่งบันทึกเอกสารพิมพ์เขียวพริ้นเตอร์ -->
    <button class="btn-print-trigger" onclick="window.print()">🖨️ สั่งพิมพ์บิลเอกสาร / บันทึกเป็นไฟล์ PDF (A4)</button>

    <!-- ----------------------------------------------------
         ใบเสร็จรับเงิน A4 ตัวจริง (อัปเดตระบบข้อมูลสดตลอดเวลา)
