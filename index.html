<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&K Billing System</title>
    <!-- Tailwind CSS -->
    <script src="https://jsdelivr.net"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Google Fonts (Anuphan) -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Anuphan', sans-serif;
            background: radial-gradient(circle at top, #0d1b2a 0%, #020813 100%);
            color: #e0e1dd;
        }
        /* Anime Glitch & Glow Effects */
        .neon-border {
            box-shadow: 0 0 15px rgba(0, 180, 216, 0.2), inset 0 0 15px rgba(0, 180, 216, 0.1);
            border: 1px solid rgba(0, 180, 216, 0.4);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .neon-border:focus-within {
            box-shadow: 0 0 25px rgba(0, 180, 216, 0.6), inset 0 0 10px rgba(0, 180, 216, 0.2);
            border-color: #00b4d8;
        }
        .anime-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .anime-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.6s ease;
        }
        .anime-btn:hover::after {
            left: 100%;
        }
        .anime-btn:active {
            transform: scale(0.95);
        }
        /* Entrance Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        /* Print Styles Override */
        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            .print-container { box-shadow: none !important; border: none !important; background: white !important; width: 100% !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            .print-text-dark { color: #1a1a1a !important; }
            .print-border { border: 1px solid #333 !important; }
            .print-bg-gray { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            input, select, textarea { border: none !important; background: transparent !important; color: black !important; padding: 0 !important; appearance: none; }
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4 md:px-0">

    <div class="max-w-4xl mx-auto bg-[#0b132b]/90 backdrop-blur-md rounded-2xl p-6 md:p-8 shadow-2xl neon-border fade-in-up print-container">

            </div>
            <div class="text-center md:text-right">

                    </div>
                    <div class="flex gap-2 items-center">
                        <span class="text-gray-400 w-20 shrink-0 print-text-dark">อำเภอ:</span>

                            <option value="ศีขรภูมิ">ศีขรภูมิ</option>
                            <option value="จอมพระ">จอมพระ</option>
                            <option value="ชุมพลบุรี">ชุมพลบุรี</option>

                            <option value="สำโรงทาบ">สำโรงทาบ</option>

                            <option value="พนมดงรัก">พนมดงรัก</option>

                            <option value="โนนนารายณ์">โนนนารายณ์</option>
                            <option value="บัวเชด">บัวเชด</option>

                <div class="space-y-2 text-sm">
                    <div class="flex gap-2 items-center">
                        <span class="text-gray-400 w-20 shrink-0 print-text-dark">ประเภทงาน:</span>
                        <select class="w-full bg-[#0b132b]/60 border border-cyan-900/50 rounded px-2 py-1 text-white focus:outline-none focus:border-cyan-500 print-text-dark">

                            <option value="FAN REPAIR">FAN REPAIR (ซ่อมพัดลม)</option>

        </div>
