<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&K Professional Billing</title>
    <style>
        /* CSS ตัวเดี่ยวจบในไฟล์ ไม่ดึงจากเน็ตเพื่อความเร็วสูงสุด */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: #060b13;
            color: #e2e8f0;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* เอฟเฟกต์อนิเมะ Matrix Glow บิลค่อยๆ เรืองแสงและขยายตัวขึ้นตอนเปิด */
        .app-container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(145deg, #0b1524, #070d18);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.15);
            border: 1px solid rgba(0, 242, 254, 0.25);
            animation: animeSpawn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes animeSpawn {
            from { opacity: 0; transform: scale(0.92) translateY(20px); filter: brightness(2); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: brightness(1); }
        }

        /* ส่วนหัวแอป */
        .header { text-align: center; margin-bottom: 20px; position: relative; }
        .logo-title { font-size: 28px; font-weight: 900; color: #00f2fe; text-shadow: 0 0 10px rgba(0,242,254,0.5); letter-spacing: 2px; }
        .logo-sub { font-size: 10px; color: #708090; tracking: 1px; text-transform: uppercase; margin-top: 2px; }
        .tagline { font-size: 11px; background: rgba(0, 242, 254, 0.1); color: #00f2fe; display: inline-block; padding: 3px 10px; border-radius: 10px; margin-top: 6px; border: 1px solid rgba(0, 242, 254, 0.2); }

        /* จัดฟอร์มแบ่งโซนสวยงาม */
        .card-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .section-title { font-size: 13px; color: #38bdf8; font-weight: 600; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .form-group { margin-bottom: 12px; }
        .form-group:last-child { margin-bottom: 0; }
        .form-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
        
        /* อินพุตแบบโมเดิร์น เต็มความกว้างจอ ไม่หลุดขอบ */
        input, select {
            width: 100%;
            background: #03070c;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 10px 12px;
            color: #fff;
            font-size: 14px;
            transition: all 0.25s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #00f2fe;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
            background: #050b14;
        }

        /* ตารางรายการแบบการ์ด เพื่อให้เหมาะกับมือถือ */
        .item-row-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 3px solid #00f2fe;
            position: relative;
        }
        .item-grid { display: flex; gap: 8px; margin-top: 6px; }
        .qty-box { flex: 1; }
        .price-box { flex: 2; }
        
        .btn-delete {
            position: absolute; right: 10px; top: 8px;
            background: none; border: none; color: #ef4444; font-size: 12px; cursor: pointer;
        }

        /* เอฟเฟกต์ปุ่มกดสไตล์ชาร์จพลังอนิเมะ (Anime Power Charge) */
        .btn-primary {
            width: 100%; background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #000; border: none; border-radius: 10px; padding: 12px;
            font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            text-transform: uppercase;
        }
        .btn-primary:active { transform: scale(0.97); filter: brightness(1.2); }

        .btn-secondary {
            width: 100%; background: #1e293b; color: #cbd5e1;
            border: none; border-radius: 10px; padding: 10px; margin-top: 8px;
            font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .btn-secondary:active { background: #334155; }

        /* สรุปยอดเงิน */
        .summary-box { display: flex; flex-direction: column; gap: 6px; margin-top: 15px; padding-top: 12px; border-t: 1px dashed rgba(255,255,255,0.1); }
        .summary-row { display: flex; justify-content: space-between; font-size: 13px; color: #94a3b8; }
        .total-row { font-size: 18px; color: #ffbc00; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 6px; margin-top: 4px; }

        /* สไตล์หน้าพิมพ์เอกสาร บังคับตัดเป็นขาวดำสวยเป็นระเบียบ */
        @media print {
            body { background: #fff !important; color: #000 !important; padding: 0; }
            .no-print { display: none !important; }
            .app-container { max-width: 100%; border: none !important; box-shadow: none !important; background: #fff !important; color: #000 !important; }
            input, select { border: none !important; background: transparent !important; color: #000 !important; padding: 2px 0 !important; appearance: none; }
            .card-section { background: none !important; border: 1px solid #000 !important; }
            .item-row-card { border: 1px solid #ccc !important; background: none !important; color: #000 !important; }
            .logo-title { color: #000 !important; text-shadow: none !important; }
            .tagline { border: 1px solid #000 !important; color: #000 !important; background: none !important; }
            .total-row { color: #000 !important; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Header -->
        <div class="header">
            <div class="logo-title">T&K</div>
            <div class="logo-sub">Electrical Appliance Repair Center</div>
            <div class="tagline">รับซ่อมในสุรินทร์ ทุกอำเภอ • 063-671-8151</div>
        </div>

        <!-- Meta Info -->
        <div class="card-section">
            <div class="form-group">
                <label>เลขที่บิล / No.</label>
                <input type="text" value="INV-202607001">
            </div>
            <div class="form-group">
                <label>วันที่ / Date</label>
                <input type="date" id="billDate">
            </div>
        </div>

        <!-- Customer Section -->
        <div class="card-section">
            <div class="section-title"><span>CUSTOMER INFO</span><span>ข้อมูลลูกค้า</span></div>
            <div class="form-group">
                <input type="text" placeholder="ชื่อ-นามสกุล ลูกค้า">
            </div>
            <div class="form-group">
                <input type="tel" placeholder="เบอร์โทรศัพท์">
            </div>
            <div class="form-group">
                <select>
                    <option value="" disabled selected>เลือกอำเภอ (ในสุรินทร์)</option>
                    <option>เมืองสุรินทร์</option><option>สังขะ</option><option>ปราสาท</option>
                    <option>ท่าตูม</option><option>ศีขรภูมิ</option><option>รัตนบุรี</option>
                    <option>จอมพระ</option><option>กาบเชิง</option><option>อื่นๆ</option>
                </select>
            </div>
        </div>

        <!-- Device Section -->
        <div class="card-section">
            <div class="section-title"><span>DEVICE INFO</span><span>ข้อมูลตัวเครื่อง</span></div>
            <div class="form-group">
                <select>
                    <option>TV REPAIR (ซ่อมทีวี)</option>
                    <option>WASHING MACHINE (เครื่องซักผ้า)</option>
                    <option>FRIDGE REPAIR (ซ่อมตู้เย็น)</option>
                    <option>A/C REPAIR & SERVICE (ล้าง/ซ่อมแอร์)</option>
                    <option>FAN REPAIR (ซ่อมพัดลม)</option>
                </select>
            </div>
            <div class="form-group">
                <input type="text" placeholder="ยี่ห้อ / รุ่น เช่น SAMSUNG, LG">
            </div>
            <div class="form-group">
                <input type="text" placeholder="อาการเสียที่ตรวจพบ">
            </div>
        </div>

        <!-- Items List -->
        <div class="card-section">
            <div class="section-title"><span>REPAIR ITEMS</span><span>รายการอะไหล่และค่าบริการ</span></div>
            
            <div id="itemsContainer">
                <!-- แถวที่ 1 เริ่มต้น -->
                <div class="item-row-card">
                    <input type="text" placeholder="ชื่ออะไหล่ หรือ ค่าแรงบริการ" class="item-name">
                    <div class="item-grid">
                        <div class="qty-box">
                            <label>จำนวน</label>
                            <input type="number" value="1" min="1" class="item-qty" oninput="calculateTotal()">
                        </div>
                        <div class="price-box">
                            <label>ราคา (บาท)</label>
                            <input type="number" value="0" min="0" class="item-price" oninput="calculateTotal()">
                        </div>
                    </div>
                </div>
            </div>

            <button type="button" class="btn-secondary no-print" onclick="addItemRow()">+ เพิ่มรายการอะไหล่/ค่าบริการ</button>
        </div>

        <!-- Summary -->
        <div class="card-section">
            <div class="summary-box">
                <div class="summary-row">
                    <span>รวมเงิน (Sub Total)</span>
