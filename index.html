<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&K ELECTRICAL - Technical Billing Dashboard</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background-color: #0f172a; color: #f8fafc; padding: 16px; display: flex; flex-direction: column; align-items: center; }
        
        /* สไตล์หน้าจอแอปป้อนข้อมูลแบบโปรช่าง (Dashboard) */
        .app-container { width: 100%; max-width: 650px; background-color: #1e293b; border-radius: 16px; padding: 24px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .header h1 { color: #38bdf8; font-size: 26px; font-weight: bold; letter-spacing: 0.5px; }
        .header p { color: #0284c7; font-size: 13px; font-weight: bold; margin-top: 4px; text-transform: uppercase; }
        
        .section-title { font-size: 14px; color: #38bdf8; font-weight: bold; margin: 15px 0 8px 0; display: flex; align-items: center; border-left: 3px solid #38bdf8; padding-left: 8px; }
        
        .form-group { margin-bottom: 12px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; font-weight: bold; }
        input, select, textarea { width: 100%; background-color: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: white; font-size: 14px; outline: none; transition: border-color 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #38bdf8; }
        textarea { resize: none; height: 75px; }
        
        /* สไตล์ตารางเพิ่มรายการอะไหล่บนมือถือ */
        .item-table-header { display: grid; grid-template-columns: 2.2fr 2fr 1.2fr 1fr 40px; gap: 6px; margin-bottom: 6px; }
        .item-table-header label { color: #cbd5e1; font-size: 11px; }
        .item-row { display: grid; grid-template-columns: 2.2fr 2fr 1.2fr 1fr 40px; gap: 6px; margin-bottom: 8px; align-items: center; }
        
        .btn-add { background-color: #0d9488; border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 5px; margin-bottom: 20px; width: 100%; font-size: 13px; }
        .btn-del { background-color: #dc2626; border: none; color: white; padding: 11px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; text-align: center; }
        .btn-submit { width: 100%; background: linear-gradient(135deg, #0284c7 0%, #2563eb 100%); border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; padding: 15px; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

        /* ----------------------------------------------
           สไตล์บิลใบเสร็จขนาด A4 (ซ่อนไว้ก่อนพิมพ์)
        ---------------------------------------------- */
        #a4Invoice {
            display: none;
            background-color: white;
            color: black;
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin-top: 25px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            position: relative;
        }
        .invoice-header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
        .shop-info h2 { color: #0284c7; font-size: 24px; font-weight: bold; }
        .shop-info p { font-size: 13px; color: #444; margin-top: 2px; }
        .invoice-title { text-align: right; }
        .invoice-title h1 { font-size: 26px; color: #333; letter-spacing: 1px; }
        .invoice-title p { font-size: 13px; margin-top: 5px; color: #555; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .client-info { background-color: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 6px; font-size: 13px; line-height: 1.6; }
        
        /* ตารางสลิป A4 */
        .invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; }
        .invoice-table th { background-color: #f1f5f9; border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-weight: bold; }
        .invoice-table td { border: 1px solid #cbd5e1; padding: 10px; vertical-align: top; }
        
        .invoice-total { display: flex; justify-content: flex-end; font-size: 15px; font-weight: bold; margin-top: 15px; border-top: 2px solid #cbd5e1; padding-top: 10px; }
        .invoice-warranty { background-color: #f0fdfa; border: 1px dashed #14b8a6; padding: 12px; border-radius: 6px; margin-top: 15px; text-align: center; color: #0f766e; font-weight: bold; font-size: 13px; }
        
        .bank-info { background-color: #eff6ff; border: 1px solid #bfdbfe; padding: 12px; border-radius: 6px; margin-top: 15px; font-size: 13px; color: #1e40af; line-height: 1.5; }
        
        /* โซนลงชื่อท้ายบิล */
        .invoice-footer { margin-top: 40px; display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 15px; text-align: center; font-size: 13px; }
        .signature-section { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .signature-box { border-top: 1px dashed #000; width: 100%; max-width: 170px; margin-top: 45px; padding-top: 5px; color: #444; font-weight: 500; }
        .stamp-zone { font-size: 11px; color: #94a3b8; border: 1px dashed #cbd5e1; padding: 8px 4px; border-radius: 6px; width: 100%; max-width: 170px; margin-bottom: 8px; text-align: center; background-color: #fafafa; font-weight: normal; }

        .btn-print-trigger { background-color: #ea580c; width: 100%; max-width: 650px; border: none; color: white; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 15px; display: none; text-align: center; box-shadow: 0 4px 12px rgba(234,88,12,0.3); }

        @media print {
            body { background: white; padding: 0; }
            .app-container, .btn-print-trigger { display: none !important; }
            #a4Invoice { display: block !important; margin: 0; box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>

    <!-- หน้าจอป้อนข้อมูลบนมือถือ (Technical Dashboard) -->
    <div class="app-container">
        <div class="header">
            <h1>T&K ELECTRICAL</h1>
            <p>On-Site Service Management Dashboard</p>
        </div>

        <div class="section-title">📂 ข้อมูลการจัดส่งและบริการลูกค้า</div>
        <div class="form-row">
            <div class="form-group">
                <label>ชื่อเจ้าของบ้าน / ลูกค้า</label>
                <input type="text" id="custName" placeholder="ระบุชื่อลูกค้า">
            </div>
            <div class="form-group">
                <label>เบอร์โทรศัพท์ติดต่อ</label>
                <input type="text" id="custPhone" placeholder="ระบุเบอร์โทรศัพท์">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>พื้นที่อำเภอ (จังหวัดสุรินทร์)</label>
                <input type="text" id="custDist" placeholder="เช่น เมืองสุรินทร์, สังขะ">
            </div>
            <div class="form-group">
                <label>สถานะการปิดรายการขาย</label>
                <select id="custStatus" onchange="checkStatusChange()">
                    <option value="yes">✅ ลูกค้าอนุมัติงานซ่อม (คิดค่าอะไหล่/แรง)</option>
                    <option value="no">❌ ลูกค้าปฏิเสธซ่อม (คิดเฉพาะค่าเดินทาง)</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>ผู้ตรวจสอบรับงานหน้างาน</label>
                <input type="text" id="payerName" placeholder="ระบุชื่อผู้จ่ายเงิน">
            </div>
            <div class="form-group">
                <label>วิศวกรช่างผู้รับผิดชอบงาน</label>
                <input type="text" id="techName" placeholder="ระบุชื่อช่าง">
            </div>
        </div>

        <div class="section-title">🔧 รายการจำแนกประเภทงานวิศวกรรมและอะไหล่</div>
        
        <div class="item-table-header">
            <label>หมวดหมู่ประเภทงาน</label>
            <label>รายละเอียดอะไหล่/ชิ้นส่วน</label>
            <label>ราคา/หน่วย</label>
            <label>จำนวน</label>
            <div></div>
        </div>
        
        <!-- รายการสินค้าแบ่งหมวดหมู่แบบมืออาชีพ -->
        <div id="itemsBlock">
            <div class="item-row">
                <select class="item-type">
                    <option value="หมวดงานระบบโทรทัศน์ (TV Repair)">📺 ระบบทีวี (TV)</option>
                    <option value="หมวดงานเครื่องซักผ้า (Washing Machine)">🧺 เครื่องซักผ้า</option>
                    <option value="หมวดงานเครื่องทำความเย็น (Refrigerator)">❄️ ตู้เย็น</option>
                    <option value="หมวดงานระบบปรับอากาศ (A/C Repair)">💨 ซ่อมแอร์บ้าน</option>
                    <option value="หมวดงานบริการบำรุงรักษาแอร์ (A/C Service)">🧼 ล้างแอร์บ้าน</option>
                    <option value="หมวดงานระบบมอเตอร์และพัดลม (Fan Repair)">🔌 พัดลม</option>
                </select>
                <input type="text" class="item-detail" placeholder="เช่น บอร์ดขยาย/แคป">
                <input type="number" class="item-price" placeholder="บาท" min="0">
                <input type="number" class="item-qty" placeholder="ชิ้น" value="1" min="1">
                <div></div>
            </div>
        </div>
        <button type="button" onclick="addNewRow()" class="btn-add">➕ เพิ่มหมวดหมู่งานซ่อม / รายการอะไหล่</button>

        <div class="form-group">
            <label>📝 รายงานสรุปผลการตรวจสอบอาการเสียและบันทึกทางเทคนิค</label>
